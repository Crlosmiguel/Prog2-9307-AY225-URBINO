<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attendance Tracker v2</title>

<style>
/* ===== THEME VARIABLES ===== */
:root{
  --bg: linear-gradient(120deg,#f6d365,#fda085);
  --box: #ffffff;
  --text: #000;
  --btn: #ff9800;
  --input: #f0f0f0;
}

body.dark{
  --bg: linear-gradient(135deg,#232526,#414345);
  --box: #2c2c2c;
  --text: #ffffff;
  --btn: #607d8b;
  --input: #444;
}

/* ===== BASE STYLES ===== */
body{
  font-family: Arial, sans-serif;
  background: var(--bg);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color: var(--text);
}

.container{
  background: var(--box);
  width:420px;
  padding:25px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{text-align:center;margin-bottom:10px;}

input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  font-size:15px;
  border:none;
}

input{
  background: var(--input);
  color: var(--text);
}

button{
  background: var(--btn);
  color:white;
  cursor:pointer;
}

button:hover{opacity:.9;}

.notice{
  text-align:center;
  margin-top:10px;
  font-weight:bold;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
  display:none;
}

th,td{
  border:1px solid #666;
  padding:6px;
  font-size:13px;
}

th{
  background: var(--btn);
  color:white;
}
</style>
</head>

<body>

<div class="container">
<h2>Attendance Tracker</h2>

<button onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>

<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">

<button onclick="timeIn()">Time In</button>
<button onclick="timeOut()">Time Out</button>
<button onclick="showData()">View Records</button>

<p class="notice" id="msg"></p>

<table id="table">
<thead>
<tr>
<th>Name</th>
<th>Course</th>
<th>Time In</th>
<th>Time Out</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>
/* ===== USERS ===== */
const users = {
  "Urbino.uphmo": {
    pw: "Unknown4321",
    name: "Carlos Miguel Urbino",
    course: "BSCS"
  }
};

let records = JSON.parse(localStorage.getItem("attendance")) || [];

/* ===== BEEP ALERT ===== */
function playBeep(){
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = "square";
  osc.frequency.setValueAtTime(800, ctx.currentTime);
  gain.gain.setValueAtTime(0.25, ctx.currentTime);

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  osc.stop(ctx.currentTime + 0.25);
}

/* ===== THEME TOGGLE ===== */
function toggleTheme(){
  document.body.classList.toggle("dark");
  const isDark = document.body.classList.contains("dark");

  localStorage.setItem("theme", isDark ? "dark" : "light");
  document.getElementById("themeBtn").innerText =
    isDark ? "☀ Light Mode" : "🌙 Dark Mode";
}

/* LOAD SAVED THEME */
if(localStorage.getItem("theme") === "dark"){
  document.body.classList.add("dark");
  document.getElementById("themeBtn").innerText = "☀ Light Mode";
}

/* ===== TIME FUNCTION ===== */
function now(){
  return new Date().toLocaleString();
}

/* ===== TIME IN ===== */
function timeIn(){
  const u = user.value.trim();
  const p = pass.value.trim();

  if(!users[u] || users[u].pw !== p){
    playBeep();
    msg.textContent = "❌ Invalid username or password";
    msg.style.color = "red";
    return;
  }

  if(records.some(r => r.user === u && !r.out)){
    msg.textContent = "⚠ Already timed in";
    msg.style.color = "orange";
    return;
  }

  records.push({
    user: u,
    name: users[u].name,
    course: users[u].course,
    in: now(),
    out: ""
  });

  save();
  msg.textContent = "✅ Time In successful";
  msg.style.color = "green";
}

/* ===== TIME OUT ===== */
function timeOut(){
  const u = user.value.trim();
  const p = pass.value.trim();

  if(!users[u] || users[u].pw !== p){
    playBeep();
    msg.textContent = "❌ Invalid username or password";
    msg.style.color = "red";
    return;
  }

  const rec = records.find(r => r.user === u && !r.out);
  if(!rec){
    msg.textContent = "⚠ No active time-in";
    msg.style.color = "orange";
    return;
  }

  rec.out = now();
  save();
  msg.textContent = "✅ Time Out recorded";
  msg.style.color = "green";
}

/* ===== SHOW DATA ===== */
function showData(){
  table.style.display = "table";
  const tbody = table.querySelector("tbody");
  tbody.innerHTML = "";

  records.forEach(r=>{
    tbody.innerHTML += `
      <tr>
        <td>${r.name}</td>
        <td>${r.course}</td>
        <td>${r.in}</td>
        <td>${r.out || "-"}</td>
      </tr>`;
  });
}

/* ===== SAVE ===== */
function save(){
  localStorage.setItem("attendance", JSON.stringify(records));
  user.value = "";
  pass.value = "";
}
</script>

</body>
</html>
